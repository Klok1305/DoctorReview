name: Выпуск обновления

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Тег существующего коммита, например v1.2.3"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest
    steps:
      - name: Получить исходники
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref }}

      - name: Установить pnpm
        uses: pnpm/action-setup@v6

      - name: Установить Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - name: Проверить соответствие тега версии
        shell: pwsh
        env:
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          $version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          if ($env:RELEASE_TAG -ne "v$version") {
            throw "Тег $env:RELEASE_TAG не соответствует версии package.json: v$version"
          }

      - name: Установить зависимости
        run: pnpm install --frozen-lockfile

      - name: Проверить состав репозитория
        run: pnpm run audit:repo

      - name: Запустить тесты
        run: pnpm test

      - name: Собрать установщики
        run: pnpm run dist:all
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Опубликовать единый атомарный релиз
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
        run: |
          $version = (Get-Content -Raw package.json | ConvertFrom-Json).version
          $assets = @(
            "dist/DoctorReview-Setup-$version-x64.exe",
            "dist/DoctorReview-Setup-$version-x64.exe.blockmap",
            "dist/DoctorReview-Portable-$version-x64.exe",
            "dist/latest.yml"
          )
          foreach ($asset in $assets) {
            if (-not (Test-Path -LiteralPath $asset)) { throw "Не найден файл релиза: $asset" }
          }

          $existingIds = @(gh api "repos/$env:GITHUB_REPOSITORY/releases?per_page=100" --paginate --jq ".[] | select(.tag_name == `"$env:RELEASE_TAG`") | .id")
          foreach ($releaseId in $existingIds) {
            gh api --method DELETE "repos/$env:GITHUB_REPOSITORY/releases/$releaseId"
          }

          gh release create $env:RELEASE_TAG @assets --draft --verify-tag --title $version --generate-notes
          gh release edit $env:RELEASE_TAG --draft=false --latest
